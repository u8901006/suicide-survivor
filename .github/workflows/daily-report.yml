name: Suicide Survivor Daily Report

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          fi
          echo "Date: $(cat $GITHUB_OUTPUT | grep target | cut -d= -f2)"

      - name: Fetch papers from PubMed
        run: |
          python scripts/fetch_papers.py \
            --days 7 \
            --max-papers 100 \
            --json \
            --output papers.json
        continue-on-error: true

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(python -c "import json; print(json.load(open('papers.json')).get('count',0))")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo '{"date":"${{ steps.date.outputs.target }}","count":0,"papers":[]}' > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python scripts/generate_report.py \
            --input papers.json \
            --output docs/survivor-${{ steps.date.outputs.target }}.html \
            --api-key "$ZHIPU_API_KEY"

      - name: Generate index page
        run: python scripts/generate_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "🪷 suicide survivor daily report: ${{ steps.date.outputs.target }}"
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          echo "### 🪷 Suicide Survivor Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.date.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }} (deduped against last 7 days)" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** [survivor-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/suicide-survivor/survivor-${{ steps.date.outputs.target }}.html)" >> $GITHUB_STEP_SUMMARY
